<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse — Pod Tracker</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand">🎙️ <span>Pod</span>Tracker</a>
  <ul class="nav-center">
    <li><a href="index.html"   data-page="home">Home</a></li>
    <li><a href="browse.html"  data-page="browse">Browse</a></li>
    <li><a href="library.html" data-page="library">My Library</a></li>
  </ul>
  <div class="nav-right">
    <div class="nav-notification">
      <a href="library.html#shared" title="Notifications">🔔</a>
      <span id="nav-notification-badge" class="hidden"></span>
    </div>
    <button id="nav-hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <button id="nav-auth-btn"></button>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1 class="page-title">Browse Podcasts</h1>
    <p class="page-subtitle">Search across Apple Podcasts, YouTube, and more — or paste any URL</p>
  </div>

  <div class="container">

    <!-- Search bar -->
    <div class="search-bar mb-2">
      <div class="search-input-wrap" style="flex:1">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Search podcasts or paste a URL…" autocomplete="off">
      </div>
      <button class="btn btn-primary" id="search-btn">Search</button>
    </div>

    <!-- Platform filter -->
    <div class="filter-bar" id="platform-filter">
      <button class="filter-chip active" data-platform="">All Platforms</button>
      <button class="filter-chip" data-platform="youtube">▶ YouTube</button>
      <button class="filter-chip" data-platform="apple">🎵 Apple</button>
      <button class="filter-chip" data-platform="spotify">🎧 Spotify</button>
      <button class="filter-chip" data-platform="rss">📡 RSS</button>
    </div>

    <!-- Category filter removed — categories are for My Library only -->

    <!-- Suggestions (shown by default) -->
    <div id="suggestions-section">
      <div class="section-header">
        <span class="section-title">✨ Suggested For You</span>
        <span class="text-muted text-sm" id="suggestions-count"></span>
      </div>
      <div id="suggestions-grid" class="grid-4">
        <div class="loading-state"><div class="spinner"></div> Finding podcasts you might like…</div>
      </div>
    </div>

    <!-- Search Results (shown when searching) -->
    <div id="results-section" class="hidden">
      <div class="section-header">
        <span class="section-title" id="results-label">Search Results</span>
        <span class="text-muted text-sm" id="results-count"></span>
      </div>
      <div id="results-grid" class="grid-4"></div>
    </div>

  </div>
</main>

<footer>Pod Tracker &copy; <span id="footer-year"></span></footer>
<div id="share-modal-container"></div>

<script type="module">
  import { supabase } from './js/supabase-client.js'
  import { initNav, getCurrentUser } from './js/auth.js'
  import { searchPodcasts, parseUrl, addPodcast, platformBadge, looksLikeUrl } from './js/search.js'
  import { initShareModal } from './js/share.js'
  import { initNotificationDropdown } from './js/notifications.js'

  document.getElementById('footer-year').textContent = new Date().getFullYear()

  // Mobile nav
  document.getElementById('nav-hamburger').addEventListener('click', () => {
    document.querySelector('.nav-center').classList.toggle('open')
  })

  let currentUser = null
  let activePlatform = ''
  let searchResults  = null
  let subscribedIds  = new Set()

  async function init() {
    await initNav('browse')
    await initNotificationDropdown()
    currentUser = await getCurrentUser()
    if (currentUser) {
      initShareModal()
      // Load user's subscribed podcast IDs so we can exclude them from suggestions
      const { data: subs } = await supabase
        .from('subscriptions')
        .select('podcast_id')
        .eq('user_id', currentUser.id)
      subscribedIds = new Set((subs || []).map(s => s.podcast_id))
    }

    // Handle URL params: ?q=query
    const params = new URLSearchParams(location.search)
    const urlQuery = params.get('q')

    if (urlQuery) {
      document.getElementById('search-input').value = urlQuery
      await doSearch()
    } else {
      await loadSuggestions()
    }
  }

  async function loadSuggestions() {
    const sugGrid = document.getElementById('suggestions-grid')
    document.getElementById('suggestions-section').classList.remove('hidden')
    document.getElementById('results-section').classList.add('hidden')

    if (!currentUser || subscribedIds.size === 0) {
      // No subscriptions yet — show popular/trending searches
      sugGrid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">🎙️</div>
        <h3>Follow some podcasts first!</h3>
        <p>Search above to find podcasts, then we'll suggest similar ones here</p>
      </div>`
      document.getElementById('suggestions-count').textContent = ''
      return
    }

    // Get subscribed podcast titles to build suggestion queries
    const { data: myPodcasts } = await supabase
      .from('subscriptions')
      .select('podcasts(title, author, platform)')
      .eq('user_id', currentUser.id)

    const titles = (myPodcasts || []).map(s => s.podcasts?.title).filter(Boolean)
    if (!titles.length) {
      sugGrid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">🎙️</div>
        <h3>Add some podcasts first</h3>
        <p>Search above to find podcasts you like</p>
      </div>`
      return
    }

    // Search for similar podcasts based on each subscription
    // Use keywords from titles to find related content
    const allSuggestions = []
    const seenIds = new Set()

    for (const title of titles.slice(0, 5)) {
      // Extract key terms (skip common words)
      const terms = title.replace(/[^a-zA-Z0-9\s]/g, '').split(/\s+/)
        .filter(w => w.length > 3 && !['with','podcast','the','and','show','episode'].includes(w.toLowerCase()))
        .slice(0, 3).join(' ')

      if (!terms) continue

      try {
        const results = await searchPodcasts(terms + ' podcast', { limit: 8 })
        for (const r of results) {
          const key = r.platform_id || r.title
          // Skip already subscribed or already suggested
          if (subscribedIds.has(r.id) || seenIds.has(key)) continue
          seenIds.add(key)
          allSuggestions.push(r)
        }
      } catch (e) { /* skip failed searches */ }
    }

    if (!allSuggestions.length) {
      sugGrid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">🔍</div>
        <h3>No new suggestions right now</h3>
        <p>Try searching for specific podcasts above</p>
      </div>`
      document.getElementById('suggestions-count').textContent = ''
      return
    }

    // Show up to 20 suggestions
    const top = allSuggestions.slice(0, 20)
    document.getElementById('suggestions-count').textContent = `${top.length} suggestions`
    renderGrid(top, sugGrid)
  }

  document.getElementById('platform-filter').addEventListener('click', (e) => {
    const chip = e.target.closest('[data-platform]')
    if (!chip) return
    document.querySelectorAll('#platform-filter .filter-chip').forEach(b => b.classList.remove('active'))
    chip.classList.add('active')
    activePlatform = chip.dataset.platform
    applyFilters()
  })

  function applyFilters() {
    if (!searchResults) return
    let filtered = searchResults
    if (activePlatform) filtered = filtered.filter(p => p.platform === activePlatform)
    renderGrid(filtered, document.getElementById('results-grid'))
  }

  async function doSearch() {
    const q = document.getElementById('search-input').value.trim()
    if (!q) {
      searchResults = null
      document.getElementById('results-section').classList.add('hidden')
      document.getElementById('suggestions-section').classList.remove('hidden')
      return
    }

    // Show results section, hide suggestions
    document.getElementById('suggestions-section').classList.add('hidden')
    document.getElementById('results-section').classList.remove('hidden')

    const resultsGrid = document.getElementById('results-grid')
    const label       = document.getElementById('results-label')
    resultsGrid.innerHTML = '<div class="loading-state"><div class="spinner"></div> Searching…</div>'
    label.textContent = `Results for "${q}"`

    if (looksLikeUrl(q)) {
      const parsed = await parseUrl(q)
      searchResults = parsed ? [parsed] : []
    } else {
      searchResults = await searchPodcasts(q)
    }

    document.getElementById('results-count').textContent = `${searchResults.length} result${searchResults.length !== 1 ? 's' : ''}`
    applyFilters()
  }

  document.getElementById('search-btn').addEventListener('click', doSearch)
  document.getElementById('search-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doSearch()
  })

  function renderGrid(podcasts, grid = document.getElementById('results-grid')) {

    if (!podcasts.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">🔍</div>
        <h3>No podcasts found</h3>
        <p>Try a different search term or paste a URL</p>
      </div>`
      return
    }

    grid.innerHTML = podcasts.map(p => podcastCardHTML(p)).join('')

    // Wire up subscribe buttons
    grid.querySelectorAll('[data-subscribe]').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation()
        if (!currentUser) { window.location.href = 'login.html'; return }
        await handleSubscribe(btn)
      })
    })

    // Wire up card clicks
    grid.querySelectorAll('.podcast-card[data-podcast-id]').forEach(card => {
      card.addEventListener('click', () => {
        window.location.href = `podcast.html?id=${card.dataset.podcastId}`
      })
    })

    // Wire up "Add & Subscribe" for external search results
    grid.querySelectorAll('[data-add-podcast]').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation()
        if (!currentUser) { window.location.href = 'login.html'; return }
        await handleAddAndSubscribe(btn)
      })
    })
  }

  function podcastCardHTML(p) {
    const isInDB    = !!p.id
    const artSrc    = p.artwork_url
    const artEl     = artSrc
      ? `<img class="podcast-card-art" src="${artSrc}" alt="" loading="lazy" onerror="this.style.display='none'">`
      : `<div class="podcast-card-art-placeholder">🎙️</div>`
    const likes     = p.like_count ?? 0
    const actionBtn = isInDB
      ? `<button class="subscribe-btn btn-sm" data-subscribe="${p.id}" data-subscribed="false">+ Follow</button>`
      : `<button class="btn btn-outline btn-sm" data-add-podcast data-podcast='${JSON.stringify(p).replace(/'/g, "&#39;")}'>+ Add</button>`

    return `
      <div class="podcast-card" data-podcast-id="${p.id || ''}">
        ${artEl}
        <div class="podcast-card-body">
          <div class="podcast-card-title">${escHtml(p.title)}</div>
          <div class="podcast-card-author text-muted">${escHtml(p.author || '')}</div>
          <div class="podcast-card-footer">
            ${platformBadge(p.platform)}
            ${likes ? `<span class="text-muted text-sm">❤️ ${likes}</span>` : ''}
          </div>
          <div style="margin-top:0.5rem">${actionBtn}</div>
        </div>
      </div>`
  }

  async function handleSubscribe(btn) {
    const podcastId = btn.dataset.subscribe
    const subscribed = btn.dataset.subscribed === 'true'

    if (subscribed) {
      await supabase.from('subscriptions').delete()
        .eq('user_id', currentUser.id).eq('podcast_id', podcastId)
      btn.textContent = '+ Follow'
      btn.dataset.subscribed = 'false'
      btn.classList.remove('subscribed')
    } else {
      await supabase.from('subscriptions').upsert(
        { user_id: currentUser.id, podcast_id: podcastId },
        { onConflict: 'user_id,podcast_id' }
      )
      btn.textContent = '✓ Following'
      btn.dataset.subscribed = 'true'
      btn.classList.add('subscribed')
    }
  }

  async function handleAddAndSubscribe(btn) {
    btn.disabled = true
    btn.textContent = 'Adding…'
    try {
      const podcastData = JSON.parse(btn.dataset.podcast)
      const { podcast_id } = await addPodcast(podcastData)
      // Subscribe
      await supabase.from('subscriptions').upsert(
        { user_id: currentUser.id, podcast_id },
        { onConflict: 'user_id,podcast_id' }
      )
      window.location.href = `podcast.html?id=${podcast_id}`
    } catch (err) {
      btn.disabled = false
      btn.textContent = '+ Add'
      alert('Could not add podcast: ' + err.message)
    }
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }

  init()
</script>
</body>
</html>
